<footer class="footer">
  <div class="footer-bg"></div>
  <div class="footer-card" appReveal>
    <div class="footer-inner">

      <div>
        <h4 class="footer-col-title">social networks</h4>
        <ul class="social-list">
          @for (link of socialLinks; track link.iconUrl) {
            <li>
              <span class="footer-brand-icon">
                <img [src]="link.iconUrl" alt="" aria-hidden="true" class="si-icon">
              </span>
              <span>{{ link.name }}</span>
            </li>
          }
        </ul>
      </div>

      <div>
        <h4 class="footer-col-title">contact us</h4>
        <ul class="contact-list">
          <li>
            <!-- IBM Carbon: Location icon -->
            <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
              <path d="M16 2a12 12 0 00-8.485 20.485L16 30.97l8.485-8.485A12 12 0 0016 2zm6.364 19.364L16 27.728l-6.364-6.364a9.9 9.9 0 1113.728 0z"/>
              <circle cx="16" cy="16" r="4"/>
            </svg>
            <span>123 Highway Ave, San Francisco, CA</span>
          </li>
          <li>
            <!-- IBM Carbon: Email icon -->
            <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
              <path d="M28 6H4a2 2 0 00-2 2v16a2 2 0 002 2h24a2 2 0 002-2V8a2 2 0 00-2-2zm-2.2 2L16 14.78 6.2 8h19.6zM4 24V9.44l11.43 7.91a1 1 0 001.14 0L28 9.44V24H4z"/>
            </svg>
            <span>hello&#64;averty.pro</span>
          </li>
        </ul>
      </div>

      <div class="footer-right">
        <p class="footer-copy">© 2026 Averty. All rights reserved.</p>
        <a href="#" class="footer-terms">Terms and Conditions.</a>
      </div>

    </div>
  </div>
</footer>
