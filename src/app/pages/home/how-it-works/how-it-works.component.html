<!-- ══════ HOW IT WORKS ══════ -->
<section class="hiw" id="how-it-works">
  <div class="hiw-bg"></div>
  <div class="hiw-inner">
    <div class="section-header" appReveal>
      <h2 class="section-title">HOW IT WORKS</h2>
      <p class="section-sub">Predictive awareness when it matters most</p>
    </div>

    <div class="steps-grid">
      <!-- SVG Curved Connector Lines (desktop only) -->
      <svg class="grid-connector-lines" width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        <defs>
          <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="33%" stop-color="#facc15" />
            <stop offset="66%" stop-color="#fb923c" />
            <stop offset="100%" stop-color="#4ade80" />
          </linearGradient>
          <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        
        <!-- Soft background curved path -->
        <path d="M 250,220 C 450,160 550,320 750,260 C 500,260 500,700 250,700 C 450,640 550,800 750,740" fill="none" stroke="url(#pathGrad)" stroke-width="6" opacity="0.12" />
        
        <!-- Dotted animated overlay -->
        <path d="M 250,220 C 450,160 550,320 750,260 C 500,260 500,700 250,700 C 450,640 550,800 750,740" fill="none" stroke="url(#pathGrad)" stroke-width="2.5" stroke-dasharray="6 8" class="curved-path-animated" />

        <!-- Glowing dot traveling along the path -->
        <circle r="7" fill="#60a5fa" filter="url(#pulseGlow)">
          <animateMotion 
            dur="9s" 
            repeatCount="indefinite" 
            path="M 250,220 C 450,160 550,320 750,260 C 500,260 500,700 250,700 C 450,640 550,800 750,740" />
        </circle>
      </svg>

      @for (step of steps(); track step.number) {
        <div [class]="'step-wrapper step-' + step.number" appReveal>
          <div class="bubble-container">
            <span class="step-bubble-text">{{ step.bubble }}</span>
            <div class="bubble-line"></div>
          </div>
          
          <app-card [class]="'step-card ' + step.colorClass + ' ' + step.delayClass">
            <span [class]="'step-number ' + step.colorClass">{{ step.number }}</span>
            <div [class]="'step-icon ' + step.colorClass">
              <lucide-icon [img]="step.iconObj" [strokeWidth]="3" [size]="140"></lucide-icon>
            </div>
            <div class="step-text">
              <p class="step-title">{{ step.title }}</p>
              <p class="step-desc">{{ step.description }}</p>
            </div>
          </app-card>
        </div>
      }
    </div>
  </div>
</section>
