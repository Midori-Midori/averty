<!-- ══════ HOW IT WORKS ══════ -->
<section class="hiw" id="how-it-works">
  <div class="hiw-bg"></div>
  <div class="hiw-inner">
    <div class="section-header" appReveal>
      <h2 class="section-title">HOW IT WORKS</h2>
      <p class="section-sub">Real-time crash prevention workflow</p>
    </div>

    <div class="steps-grid">
      <!-- SVG Curved Connector Lines (desktop only) -->
      <svg class="grid-connector-lines" width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        <defs>
          <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="33%" stop-color="#facc15" />
            <stop offset="66%" stop-color="#fb923c" />
            <stop offset="100%" stop-color="#4ade80" />
          </linearGradient>
        </defs>
        
        <!-- Soft background curved path -->
        <path d="M 250,200 C 500,200 500,320 750,320 C 500,320 500,680 250,680 C 500,680 500,800 750,800" fill="none" stroke="url(#pathGrad)" stroke-width="6" opacity="0.12" />
        
        <!-- Dotted animated overlay -->
        <path d="M 250,200 C 500,200 500,320 750,320 C 500,320 500,680 250,680 C 500,680 500,800 750,800" fill="none" stroke="url(#pathGrad)" stroke-width="2.5" stroke-dasharray="6 8" class="curved-path-animated" />
      </svg>

      @for (step of steps(); track step.number) {
        <div [class]="'step-wrapper step-' + step.number" appReveal>
          <div class="bubble-container">
            <app-badge [variant]="'default'" customClass="step-bubble">
              {{ step.bubble }}
            </app-badge>
            <div class="bubble-line"></div>
          </div>
          
          <app-card [class]="'step-card ' + step.colorClass + ' ' + step.delayClass">
            <span [class]="'step-number ' + step.colorClass">{{ step.number }}</span>
            <div [class]="'step-icon ' + step.colorClass">
              <lucide-icon [img]="step.iconObj" [strokeWidth]="3" [size]="140"></lucide-icon>
            </div>
            <div class="step-text">
              <p class="step-title">{{ step.title }}</p>
              <p class="step-desc">{{ step.description }}</p>
            </div>
          </app-card>
        </div>
      }
    </div>
  </div>
</section>
