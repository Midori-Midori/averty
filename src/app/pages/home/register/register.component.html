<!-- ══════ REGISTER ══════ -->
<section class="register" id="register">
  <div class="register-bg"></div>
  <div class="register-inner">
    <app-card [hoverable]="false" class="register-card" appReveal>

      <div class="form-side">
        <h2 class="register-title">Sign up in seconds</h2>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          
          <app-input 
            id="name" 
            label="Name:" 
            placeholder="Enter your name" 
            [control]="$any(registerForm.get('name'))"
            [errorMessages]="{ pattern: 'Only letters are allowed' }">
          </app-input>

          <app-input 
            id="lastName" 
            label="Last Name:" 
            placeholder="Enter your last name" 
            [control]="$any(registerForm.get('lastName'))"
            [errorMessages]="{ pattern: 'Only letters are allowed' }">
          </app-input>

          <app-input 
            id="email" 
            label="Email:" 
            type="email"
            placeholder="Enter your email" 
            [control]="$any(registerForm.get('email'))">
          </app-input>

          <app-input 
            id="phone" 
            label="Phone Number:" 
            type="tel"
            placeholder="e.g. +52 55 1234 5678" 
            [control]="$any(registerForm.get('phone'))"
            [errorMessages]="{ pattern: 'Must include country code (e.g. +52) and valid number' }">
          </app-input>

          <app-button type="submit" variant="register" [disabled]="registerForm.invalid || isSubmitting()">
            @if (isSubmitting()) { Registering... } @else { Register }
          </app-button>

          @if (submitMessage()) {
            <div [class]="'submit-feedback ' + (submitSuccess() ? 'success' : 'error')">
              {{ submitMessage() }}
            </div>
          }
        </form>
      </div>

      <div class="divider"></div>

      <div class="social-side">
        <p class="social-heading">Or sign up with</p>

        <!-- Google -->
        <app-social-button provider="google">sign in with Google</app-social-button>

        <!-- Apple -->
        <app-social-button provider="apple">sign in with Apple</app-social-button>

        <!-- Email -->
        <app-social-button provider="email">Use my email</app-social-button>

        <app-button variant="social-outline">Other options</app-button>
      </div>

    </app-card>
  </div>
</section>
