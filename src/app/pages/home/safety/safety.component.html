<!-- ══════ ROAD SAFETY CHALLENGES ══════ -->
<section class="safety" id="safety">
  <div class="safety-bg"></div>
  <div class="safety-inner">
    <div class="section-header" appReveal>
      <h2 class="section-title">WHY IT MATTERS</h2>
      <p class="section-sub">The reality of our roads today</p>
    </div>

    <div class="safety-grid">
      @for (fact of facts(); track fact.title) {
        <app-card [class]="'safety-card ' + fact.colorClass + ' ' + fact.delayClass" appReveal>
          <div class="safety-card-content">
            <span [class]="'safety-highlight ' + fact.colorClass">{{ fact.highlight }}</span>
            <h3 class="safety-title">{{ fact.title }}</h3>
            <p class="safety-desc">{{ fact.description }}</p>
          </div>
        </app-card>
      }
    </div>
  </div>
</section>
